<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changes in Life Expectancy by Country, 1900-2025</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <style>
    :root {
      --canvas-w: min(100vw, calc(100vh * 9 / 16));
      --canvas-h: calc(var(--canvas-w) * 16 / 9);
      --ink: #f9fbff;
      --soft: rgba(249, 251, 255, 0.76);
      --muted: rgba(249, 251, 255, 0.58);
      --gold: #f0c35a;
      --teal: #27c7bd;
      --deep: #020a16;
      --panel: rgba(255, 255, 255, 0.1);
      --line: rgba(179, 229, 232, 0.2);
      --line-strong: rgba(179, 229, 232, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 10%, rgba(39, 199, 189, 0.14), transparent 32rem),
        linear-gradient(145deg, #06162d, #020a16);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      position: relative;
      width: var(--canvas-w);
      height: var(--canvas-h);
      max-width: 1080px;
      max-height: 1920px;
      overflow: hidden;
      background:
        radial-gradient(circle at 17% 8%, rgba(240, 195, 90, 0.25), transparent 24%),
        radial-gradient(circle at 78% 70%, rgba(39, 199, 189, 0.25), transparent 31%),
        linear-gradient(145deg, #a99160 0%, #315f7e 43%, #061a38 100%);
      outline: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.34);
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(180deg, rgba(4, 19, 39, 0.08), rgba(4, 19, 39, 0.62)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 90px);
      mix-blend-mode: soft-light;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 115%, rgba(0, 0, 0, 0.48), transparent 42%);
    }

    .content {
      position: relative;
      height: 100%;
      padding: 5.7% 7.4% 7.4%;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 1.25%;
    }

    header {
      padding-top: 1%;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.7em;
      margin: 0 0 1.35%;
      color: rgba(255, 255, 255, 0.68);
      font-size: clamp(10px, calc(var(--canvas-w) * 0.021), 23px);
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .kicker::before {
      content: "";
      width: 2.7em;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--gold), var(--teal));
      box-shadow: 0 0 18px rgba(240, 195, 90, 0.32);
    }

    h1 {
      margin: 0;
      max-width: 80%;
      color: #fffdf6;
      font-size: clamp(30px, calc(var(--canvas-w) * 0.058), 63px);
      line-height: 0.98;
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 9px 26px rgba(0, 0, 0, 0.2);
    }

    .subtitle {
      margin: 1.55% 0 0;
      color: var(--gold);
      font-size: clamp(22px, calc(var(--canvas-w) * 0.046), 50px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
    }

    .progress-wrap {
      width: 100%;
      height: clamp(8px, calc(var(--canvas-w) * 0.013), 15px);
      overflow: hidden;
      border: 1px solid rgba(179, 229, 232, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      box-shadow: inset 0 1px 10px rgba(0, 0, 0, 0.16);
    }

    .progress {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--teal), #78b8ff);
      box-shadow: 0 0 26px rgba(39, 199, 189, 0.52);
    }

    .chart-shell {
      position: relative;
      margin-top: 0;
      padding: 3.1% 3.65% 2.8%;
      border: 1px solid var(--line-strong);
      border-radius: clamp(22px, calc(var(--canvas-w) * 0.034), 38px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.135), rgba(255, 255, 255, 0.052)),
        rgba(3, 17, 34, 0.42);
      box-shadow: 0 30px 82px rgba(0, 8, 20, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .insight {
      flex: none;
      margin: 0 0 2.2%;
      color: rgba(255, 253, 246, 0.84);
      font-size: clamp(13px, calc(var(--canvas-w) * 0.025), 27px);
      line-height: 1.28;
      font-weight: 760;
      letter-spacing: 0;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      flex: 1 1 auto;
      min-height: 0;
      overflow: visible;
    }

    .country-label {
      fill: #fffefa;
      font-size: 30px;
      font-weight: 900;
      paint-order: stroke;
      stroke: rgba(0, 9, 20, 0.46);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .flag-label {
      fill: #fffefa;
      font-size: 31px;
      font-weight: 900;
      text-anchor: middle;
      paint-order: stroke;
      stroke: rgba(0, 9, 20, 0.46);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .bar-value {
      fill: #ffffff;
      font-size: 30px;
      font-weight: 900;
      paint-order: stroke;
      stroke: rgba(0, 9, 20, 0.52);
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .axis-label {
      fill: rgba(255, 255, 255, 0.5);
      font-size: 18px;
      font-weight: 700;
    }

    .tick line {
      stroke: rgba(179, 229, 232, 0.075);
      stroke-width: 1.6;
    }

    .tick text {
      fill: rgba(255, 255, 255, 0.38);
      font-size: 17px;
      font-weight: 700;
    }

    .domain {
      display: none;
    }

    .footer-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 6%;
      padding: 0 2.5% 2.15% 0;
    }

    .note {
      margin: 0 0 2.4%;
      max-width: 470px;
      color: rgba(255, 255, 255, 0.52);
      font-size: clamp(10px, calc(var(--canvas-w) * 0.019), 21px);
      line-height: 1.32;
      font-weight: 620;
    }

    .year-box {
      position: relative;
      min-width: clamp(142px, calc(var(--canvas-w) * 0.285), 308px);
      text-align: right;
      margin-right: 3.4%;
      margin-bottom: 3.4%;
    }

    .year {
      display: block;
      color: rgba(255, 255, 255, 0.95);
      font-variant-numeric: tabular-nums;
      font-size: clamp(58px, calc(var(--canvas-w) * 0.145), 157px);
      line-height: 0.88;
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 20px 45px rgba(0, 0, 0, 0.34);
      transform-origin: 50% 55%;
    }

    .year-caption {
      margin-top: 4%;
      color: var(--gold);
      font-size: clamp(10px, calc(var(--canvas-w) * 0.019), 21px);
      font-weight: 850;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .replay {
      position: absolute;
      right: 7.4%;
      top: 3.9%;
      z-index: 3;
      border: 1px solid rgba(179, 229, 232, 0.24);
      border-radius: 999px;
      padding: clamp(6px, calc(var(--canvas-w) * 0.013), 14px) clamp(10px, calc(var(--canvas-w) * 0.024), 26px);
      color: rgba(255, 255, 255, 0.72);
      background: rgba(3, 17, 34, 0.54);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(12px);
      font: inherit;
      font-size: clamp(10px, calc(var(--canvas-w) * 0.019), 21px);
      font-weight: 760;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
      opacity: 0.52;
    }

    .stage.playing .replay {
      opacity: 0.16;
    }

    .stage.complete .replay {
      opacity: 0.72;
    }

    .row.top-rank .bar {
      filter: url(#topBarGlow);
    }

    .replay:hover,
    .replay:focus-visible {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.22);
    }

    .replay:focus-visible {
      outline: 3px solid rgba(240, 195, 90, 0.78);
      outline-offset: 4px;
    }

    @media (max-aspect-ratio: 9 / 16) {
      :root {
        --canvas-h: 100vh;
        --canvas-w: calc(var(--canvas-h) * 9 / 16);
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <button class="replay" type="button" id="replay">Replay</button>
    <section class="content" aria-label="Animated life expectancy bar chart race">
      <header>
        <p class="kicker">Life Expectancy</p>
        <h1>How Much Longer Do We Live Today?</h1>
        <p class="subtitle">1900 &rarr; 2025</p>
      </header>

      <div class="progress-wrap" aria-hidden="true">
        <div class="progress" id="progress"></div>
      </div>

      <div class="chart-shell">
        <p class="insight">Life expectancy rose worldwide — but not equally.</p>
        <svg id="chart" viewBox="0 0 940 1120" role="img" aria-label="Animated horizontal bar chart of life expectancy by country"></svg>
      </div>

      <footer class="footer-row">
        <p class="note">Source: Our World in Data; approximate/interpolated values.</p>
        <div class="year-box" aria-label="Current year">
          <span class="year" id="year">1900</span>
          <div class="year-caption">Current Year</div>
        </div>
      </footer>
    </section>
  </main>

  <script>
    // Approximate period life expectancy at birth, inspired by Our World in Data's long-run life expectancy series.
    // Values are 5-year points from 1900 to 2025; sparse early years and 2025 are carefully interpolated or projected.
    const countries = [
      { key: "china", label: "🇨🇳 China", color: "#e45756", values: [32.0, 32.0, 32.0, 32.0, 32.0, 32.0, 32.0, 34.5, 36.3, 38.7, 43.8, 47.2, 33.4, 53.0, 56.8, 61.0, 64.2, 66.5, 68.2, 70.4, 72.3, 74.1, 75.7, 77.0, 78.0, 79.0] },
      { key: "india", label: "🇮🇳 India", color: "#f28e2b", values: [23.6, 24.0, 23.3, 24.0, 24.7, 27.6, 29.0, 30.9, 32.3, 36.4, 41.2, 43.7, 45.6, 45.6, 48.6, 50.8, 53.6, 56.3, 58.6, 60.6, 62.7, 64.9, 67.2, 69.3, 70.2, 72.6] },
      { key: "us", label: "🇺🇸 United States", color: "#4e79a7", values: [48.9, 50.3, 51.8, 55.1, 55.4, 58.5, 59.6, 60.9, 63.2, 65.6, 68.1, 69.6, 69.8, 70.2, 70.7, 72.5, 73.7, 74.7, 75.4, 75.9, 76.8, 77.5, 78.7, 78.7, 77.0, 79.0] },
      { key: "japan", label: "🇯🇵 Japan", color: "#b07aa1", values: [38.6, 39.2, 40.0, 40.9, 42.0, 44.4, 46.6, 48.2, 39.4, 30.5, 59.3, 65.7, 67.7, 70.3, 72.0, 74.4, 76.1, 77.8, 79.0, 79.7, 81.2, 82.0, 82.9, 83.9, 84.7, 85.2] },
      { key: "uk", label: "🇬🇧 United Kingdom", color: "#59a14f", values: [45.6, 49.9, 53.3, 51.2, 57.3, 58.4, 60.8, 62.0, 60.9, 65.8, 68.6, 70.1, 71.0, 71.5, 71.9, 72.7, 73.6, 74.5, 75.7, 76.6, 77.8, 79.1, 80.4, 80.9, 80.4, 81.6] },
      { key: "germany", label: "🇩🇪 Germany", color: "#edc948", values: [43.9, 45.5, 48.4, 40.5, 49.0, 57.4, 59.5, 61.5, 61.1, 60.6, 66.8, 68.3, 69.3, 70.6, 70.7, 71.5, 73.1, 74.5, 75.3, 76.6, 78.1, 79.3, 80.1, 80.6, 81.0, 81.6] },
      { key: "brazil", label: "🇧🇷 Brazil", color: "#76b7b2", values: [29.0, 30.0, 31.0, 31.5, 32.0, 33.0, 34.0, 35.5, 37.0, 42.3, 48.5, 50.9, 53.2, 55.2, 57.3, 59.6, 61.8, 64.0, 65.9, 67.7, 69.6, 71.8, 73.8, 75.1, 74.5, 76.6] },
      { key: "russia", label: "🇷🇺 Russia", color: "#ff9da7", values: [30.5, 28.0, 25.5, 23.0, 20.5, 35.2, 36.5, 39.6, 41.2, 45.3, 55.5, 62.1, 68.3, 69.3, 68.7, 68.3, 67.5, 68.3, 69.3, 64.0, 65.0, 65.2, 68.2, 71.3, 71.2, 73.4] },
      { key: "nigeria", label: "🇳🇬 Nigeria", color: "#9c755f", values: [31.0, 31.5, 32.0, 32.0, 32.5, 33.0, 33.5, 34.0, 34.5, 35.0, 35.5, 36.3, 37.2, 38.2, 40.0, 43.1, 46.0, 46.2, 45.7, 45.9, 47.1, 49.5, 51.3, 51.9, 53.1, 55.2] },
      { key: "mexico", label: "🇲🇽 Mexico", color: "#45b7d1", values: [25.0, 26.8, 28.0, 31.0, 34.0, 32.1, 34.0, 40.4, 39.0, 44.2, 43.8, 49.6, 53.6, 56.7, 58.9, 61.9, 64.3, 66.8, 69.0, 70.7, 72.6, 73.6, 73.7, 74.4, 70.4, 75.5] }
    ];

    const years = d3.range(1900, 2030, 5);
    const duration = 30;
    const svg = d3.select("#chart");
    const progressEl = document.querySelector("#progress");
    const yearEl = document.querySelector("#year");
    const stageEl = document.querySelector("#stage");
    const replayButton = document.querySelector("#replay");

    const width = 940;
    const height = 1120;
    const margin = { top: 48, right: 118, bottom: 76, left: 28 };
    const labelWidth = 344;
    const chartX = margin.left + labelWidth;
    const chartWidth = width - chartX - margin.right;
    const yTop = margin.top + 40;
    const y = d3.scaleBand()
      .domain(d3.range(countries.length))
      .range([yTop, yTop + 958])
      .paddingInner(0.2)
      .paddingOuter(0.08);
    const rowHeight = y.bandwidth();
    const barHeight = 56;
    const barY = (rowHeight - barHeight) / 2;
    const labelY = rowHeight / 2 + 11;
    const valueOffset = 20;
    let lastYear = 1900;
    let renderedYear = null;

    const x = d3.scaleLinear()
      .domain([20, 90])
      .range([0, chartWidth]);

    const axis = d3.axisTop(x)
      .tickValues([30, 40, 50, 60, 70, 80, 90])
      .tickSize(-(height - margin.top - margin.bottom - 58))
      .tickFormat(d => d);

    svg.append("g")
      .attr("class", "x-axis")
      .attr("transform", `translate(${chartX},${margin.top})`)
      .call(axis);

    svg.append("text")
      .attr("class", "axis-label")
      .attr("x", chartX)
      .attr("y", margin.top - 32)
      .text("Ranked by life expectancy at birth");

    const rows = svg.append("g")
      .attr("class", "rows");

    function interpolateValue(country, year) {
      const clamped = Math.max(1900, Math.min(2025, year));
      const lowerYear = Math.floor((clamped - 1900) / 5) * 5 + 1900;
      const upperYear = Math.min(2025, lowerYear + 5);
      const lowerIndex = (lowerYear - 1900) / 5;
      const upperIndex = (upperYear - 1900) / 5;
      const lowerValue = country.values[lowerIndex];
      const upperValue = country.values[upperIndex];
      if (lowerYear === upperYear) return lowerValue;
      return lowerValue + (upperValue - lowerValue) * ((clamped - lowerYear) / (upperYear - lowerYear));
    }

    function rankedData(year) {
      return countries
        .map(country => ({
          ...country,
          value: interpolateValue(country, year)
        }))
        .sort((a, b) => d3.descending(a.value, b.value));
    }

    function rowY(index) {
      return y(index);
    }

    function bgColor(progress) {
      const stops = [
        d3.rgb("#bfa977"),
        d3.rgb("#496f88"),
        d3.rgb("#071d3f")
      ];
      if (progress < 0.52) {
        return d3.interpolateRgb(stops[0], stops[1])(progress / 0.52);
      }
      return d3.interpolateRgb(stops[1], stops[2])((progress - 0.52) / 0.48);
    }

    function draw(year, first = false) {
      const rankYear = Math.round((year - 1900) / 5) * 5 + 1900;
      const displayYear = Math.max(1900, Math.min(2025, rankYear));
      const data = rankedData(displayYear);
      const progress = (year - 1900) / 125;

      progressEl.style.width = `${Math.max(0, Math.min(100, progress * 100))}%`;
      stageEl.style.background = `
        radial-gradient(circle at 17% 8%, rgba(240, 195, 90, ${0.28 - progress * 0.1}), transparent 24%),
        radial-gradient(circle at 78% 70%, rgba(39, 199, 189, ${0.2 + progress * 0.14}), transparent 31%),
        linear-gradient(145deg, ${bgColor(progress)} 0%, ${d3.interpolateRgb("#315f7e", "#123e68")(progress)} 48%, ${d3.interpolateRgb("#061a38", "#020a16")(progress)} 100%)`;

      if (displayYear === renderedYear && !first) {
        return;
      }

      renderedYear = displayYear;
      rows.selectAll(".row").interrupt();
      rows.selectAll(".row *").interrupt();
      const t = first ? svg.transition().duration(0) : svg.transition().duration(680).ease(d3.easeCubicInOut);

      if (displayYear !== lastYear || first) {
        yearEl.textContent = displayYear;
        gsap.fromTo(yearEl, {
          yPercent: -20,
          rotateX: 58,
          opacity: 0.25,
          scale: 0.94
        }, {
          yPercent: 0,
          rotateX: 0,
          opacity: 1,
          scale: 1,
          duration: 0.38,
          ease: "power3.out"
        });
        lastYear = displayYear;
      }

      const row = rows.selectAll(".row")
        .data(data, d => d.key);

      const entered = row.enter()
        .append("g")
        .attr("class", "row")
        .attr("transform", (d, i) => `translate(0,${rowY(i)})`)
        .attr("opacity", 0);

      entered.append("text")
        .attr("class", "flag-label")
        .attr("x", margin.left + 31)
        .attr("y", labelY)
        .text(d => d.flag || d.label.split(" ")[0]);

      entered.append("text")
        .attr("class", "country-label")
        .attr("x", margin.left + 76)
        .attr("y", labelY)
        .text(d => d.name || d.label.replace(d.label.split(" ")[0], "").trim());

      entered.append("rect")
        .attr("class", "bar")
        .attr("x", chartX)
        .attr("y", barY)
        .attr("rx", 16)
        .attr("ry", 16)
        .attr("height", barHeight)
        .attr("width", 0)
        .attr("fill", d => d.color)
        .attr("filter", "url(#barShadow)");

      entered.append("text")
        .attr("class", "bar-value")
        .attr("x", chartX + 8)
        .attr("y", labelY)
        .text(d => d.value.toFixed(1));

      const merged = entered.merge(row);

      merged.classed("top-rank", (d, i) => displayYear === 2025 && i === 0);

      merged.transition(t)
        .attr("opacity", 1)
        .attr("transform", (d, i) => `translate(0,${rowY(i)})`);

      merged.select(".bar")
        .transition(t)
        .attr("width", d => x(d.value));

      merged.select(".bar-value")
        .transition(t)
        .attr("x", d => Math.min(chartX + x(d.value) + valueOffset, width - 34))
        .tween("text", function(d) {
          const node = this;
          const current = parseFloat(node.textContent) || d.value;
          const interpolator = d3.interpolateNumber(current, d.value);
          return function(alpha) {
            node.textContent = interpolator(alpha).toFixed(1);
          };
        });

      row.exit()
        .transition(t)
        .attr("opacity", 0)
        .remove();
    }

    svg.append("defs")
      .html(`
        <filter id="barShadow" x="-10%" y="-60%" width="130%" height="220%">
          <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#001326" flood-opacity="0.28"/>
        </filter>
        <filter id="topBarGlow" x="-14%" y="-90%" width="140%" height="280%">
          <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#f0c35a" flood-opacity="0.34"/>
          <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#001326" flood-opacity="0.28"/>
        </filter>
      `);

    const state = { year: 1900 };
    let timeline;

    function play() {
      if (timeline) timeline.kill();
      gsap.killTweensOf(yearEl);
      gsap.killTweensOf(".top-rank");
      stageEl.classList.remove("complete");
      stageEl.classList.add("playing");
      state.year = 1900;
      lastYear = 0;
      renderedYear = null;
      draw(1900, true);
      timeline = gsap.timeline();
      timeline.to(state, {
        year: 2025,
        duration,
        ease: "none",
        onUpdate: () => draw(state.year),
        onComplete: finishAnimation
      });
    }

    function finishAnimation() {
      stageEl.classList.remove("playing");
      stageEl.classList.add("complete");
      draw(2025);
      gsap.fromTo(yearEl, { scale: 1 }, {
        scale: 1.045,
        duration: 0.72,
        yoyo: true,
        repeat: 1,
        ease: "sine.inOut"
      });
      gsap.fromTo(".row.top-rank", { scale: 1 }, {
        scale: 1.018,
        transformOrigin: "50% 50%",
        duration: 0.82,
        yoyo: true,
        repeat: 1,
        ease: "sine.inOut"
      });
    }

    replayButton.addEventListener("click", play);
    window.addEventListener("load", play);
  </script>
</body>
